name: Question
description: Ask for help using or developing FastADB.
title: "[Question]: "
labels: ["question", "needs-triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or accomplish?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FastADB version
      placeholder: 0.1.0-beta.5
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Not platform-specific
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include ADB/scrcpy versions or relevant logs when useful.
