name: Multi-Platform Build

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = "${{ github.ref_name }}"
          if (-not $version.StartsWith("v")) { $version = "dev-${{ github.sha }}" }
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "dist/FastADB-$version-windows-x64.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastadb-windows
          path: dist/*.zip

  build-macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$VERSION" != v* ]]; then VERSION="dev-${GITHUB_SHA}"; fi
          ditto -c -k --keepParent build/macos/Build/Products/Release/fastadb.app "dist/FastADB-$VERSION-macos.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastadb-macos
          path: dist/*.zip

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$VERSION" != v* ]]; then VERSION="dev-${GITHUB_SHA}"; fi
          tar -czf "dist/FastADB-$VERSION-linux-x64.tar.gz" -C build/linux/x64/release/bundle .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastadb-linux
          path: dist/*.tar.gz

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FastADB ${{ github.ref_name }}
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
