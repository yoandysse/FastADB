name: fastadb
description: "Desktop app to manage ADB connections across Windows, macOS, and Linux."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Data persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.0.0

  # System integration
  file_picker: ^8.0.0
  process_run: ^0.14.0
  path: ^1.9.0
  path_provider: ^2.1.0
  window_manager: ^0.3.9
  system_tray: ^2.0.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

  # Testing
  mockito: ^5.4.0

  # Linting
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
